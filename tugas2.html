<!DOCTYPE html>
<html>
<head>
    <title>Tugas 2</title>
    <style>
        body {
            background-color: #C0E8FB;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 800px;
            min-height: 500px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: #E2D800;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #032152;
            border-top: 10px dotted #4D83AA;
        }

        .content {
            padding: 40px;
            text-align: center;
        }

        .form-box {
            width: 500px;
            margin: 20px auto;
            background: #C0E8FB;
            padding: 20px;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="password"] {
            width: 250px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #999;
        }

        button {
            padding: 8px 20px;
            background: #4D83AA;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #032152;
        }

        a {
            text-decoration: none;
            color: #032152;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        Soal Pertama :)
    </div>

    <div class="content">

        <h2>Formulir Entah Apa</h2>

        <div class="form-box">

            <div class="form-group">
                Username <br>
                <input type="text" placeholder="Username">
            </div>

            <div class="form-group">
                Password <br>
                <input type="password" placeholder="Password">
            </div>

            <div class="form-group">
                Verification Code <br>
                <input type="text" placeholder="Isi kode anda">
            </div>

            <div class="form-group">
                <input type="checkbox"> Remember Me
            </div>

            <button>Submit</button>

        </div>

        <br>
        <a href="tugas1.html">← Kembali ke Soal Pertama</a>

    </div>

</div>

</body>
</html>
