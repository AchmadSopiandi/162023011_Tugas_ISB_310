<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Preferensi Warna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Preferensi Warna</h1>

    <fieldset>
        <legend>Warna</legend>

        <div class="form-group">
            <label>1. Warna latarbelakang</label>
            <div class="color-preview" id="bgPreview"></div>
        </div>

        <div class="form-group">
            <label>2. Warna teks</label>
            <div class="color-preview" id="textPreview"></div>
        </div>
    </fieldset>

    <button id="saveBtn">Simpan</button>
</div>

<div class="modal" id="colorModal">
    <div class="modal-content">
        <div class="modal-header">
            <button id="cancelBtn">Cancel</button>
            <h3>Choose a color</h3>
            <button id="selectBtn" class="select-btn">Select</button>
        </div>

        <div class="color-grid" id="colorGrid">
            <!-- warna akan dibuat oleh JS -->
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
